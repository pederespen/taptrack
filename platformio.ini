; PlatformIO project configuration for the RFID Music Box (taptrack)
;
; Environments:
;   nano         -> final build (Arduino Nano, ATmega328P, new bootloader)
;   uno          -> breadboard prototype (Arduino Uno R3)
;   uid_scanner  -> flash this to print tag UIDs to the serial monitor,
;                   then copy them into include/cards.h
;
; Build/upload examples:
;   pio run -e nano -t upload
;   pio run -e uid_scanner -t upload && pio device monitor

[platformio]
default_envs = nano

[env]
platform = atmelavr
framework = arduino
monitor_speed = 115200
lib_deps =
    miguelbalboa/MFRC522@^1.4.2
    dfrobot/DFRobotDFPlayerMini@^1.0.6

[env:nano]
; CH340 Nano clones usually ship the "new" (optiboot) bootloader.
; If uploads fail, switch board to: nanoatmega328
board = nanoatmega328new
build_src_filter = +<*> -<uid_scanner.cpp>

[env:uno]
board = uno
build_src_filter = +<*> -<uid_scanner.cpp>

[env:uid_scanner]
board = uno
build_src_filter = +<uid_scanner.cpp> -<main.cpp>
